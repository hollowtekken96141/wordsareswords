<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swords2</title>
    <style>
        @font-face {
            font-family: 'AmericanLights';
            src: url('./fonts/AmericanLights.ttf') format('truetype');
        }
        
        @font-face {
            font-family: 'Mom';
            src: url('./fonts/Mom«t___.ttf') format('truetype');
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Mom', sans-serif;
            color: #ffffff;
            background-color: #000000;
        }

        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            object-fit: cover;
            object-position: center;
        }

        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .logo {
            position: absolute;
            top: 10px;
            right: 20px;
            z-index: 20;
        }

        .logo img {
            max-width: 250px;
            height: auto;
            display: block;
        }

        .content {
            padding: 5vw;
            padding-top: 110px;
            text-align: left;
            overflow-y: auto;
            max-height: calc(100vh - 110px);
        }

        h1 {
            font-family: 'AmericanLights', sans-serif;
            font-size: clamp(45px, 15vw, 55px);
            color: #ffffff;
            margin-bottom: 40px;
            font-weight: normal;
        }

        .info-section {
            font-family: 'Mom', sans-serif;
            font-size: clamp(14px, 3vw, 18px);
            line-height: 2;
            color: #ffffff;
        }

        .info-section p {
            display: block;
            width: fit-content;
            background-color: rgba(0, 0, 0, 1);
            padding: 2px 8px;
            margin-bottom: 20px;
        }

        h1 a {
            text-decoration: none;
        }

        a {
            color: #ffffff;
            text-decoration: underline;
            cursor: pointer;
        }

        a:hover {
            color: #cccccc;
        }

        @media (max-width: 768px) {
            .logo {
                position: fixed;
                top: 50vh;
                left: -25vw;
                right: auto;
                width: 150%;
                height: 20%;
                z-index: 2;
            }

            .logo img {
                width: 100%;
                height: 300%;
                max-width: none;
                object-fit: fill;
            }

            .content {
                padding-top: 20px;
                max-height: none;
                z-index: 5;
            }
        }

    </style>
</head>
<body>
    <img src="./images/background.gif" alt="Background" class="background">
    
    <div class="container">
        <div class="logo">
            <img src="./images/logo.gif" alt="Logo">
        </div>

        <div class="content">
            <h1><a href="https://instagram.com/2swords2" target="_blank" rel="noopener noreferrer">Swords2</a></h1>
            
            <div class="info-section">
                <p>For booking and other inquiries email - <a href="mailto:youcangofuckoff@gmail.com">youcangofuckoff@gmail.com</a></p>
                
                <p><a href="https://youtube.com/@swords7?si=LEY5tjwrUSU1Th_A" target="_blank" rel="noopener noreferrer">music videos</a></p>
                
                <p><a href="https://soundcloud.com/swords2" target="_blank" rel="noopener noreferrer">soundcloud</a></p>
                
                <p><a href="https://open.spotify.com/artist/6r3hk2gxKo56hw8sFpeUKA" target="_blank" rel="noopener noreferrer">spotify</a></p>
                
                <p><a href="https://music.apple.com/us/artist/swords2/1588060878" target="_blank" rel="noopener noreferrer">apple music</a></p>
                
                <p><a href="https://lecitadell.com" target="_blank" rel="noopener noreferrer">le citadell</a></p>
            </div>
        </div>
    </div>
</body>
</html>
